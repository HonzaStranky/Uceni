<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HonzaUceni</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #FF6584;
            --success: #4CAF50;
            --bg: #F0F2F5;
            --en-color: #00B4D8;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--primary); margin-bottom: 20px; text-align: center; }

        .screen { width: 100%; max-width: 800px; display: none; }
        .active-screen { display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-family: 'Fredoka One', cursive;
            font-size: 1.4rem;
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 25px rgba(0,0,0,0.15); }
        .card-math { border-bottom: 10px solid var(--primary); color: var(--primary); }
        .card-cz { border-bottom: 10px solid var(--secondary); color: var(--secondary); }
        .card-en { border-bottom: 10px solid var(--en-color); color: var(--en-color); }

        .sub-list { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .sub-item {
            background: white;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid var(--en-color);
            color: var(--en-color);
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .sub-item:hover { background: var(--en-color); color: white; }

        .game-container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        #timer-display {
            position: absolute;
            top: -60px;
            right: 0;
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            color: var(--en-color);
            border: 3px solid var(--en-color);
            display: none;
        }

        .back-btn {
            background: #eee;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .question { font-size: 2.2rem; margin: 10px 0; color: #333; line-height: 1.4; }
        
        /* Styl pro input a nápovědu */
        .input-area { margin: 20px 0; }
        input { font-size: 1.8rem; padding: 10px; width: 85%; text-align: center; border: 3px solid #ddd; border-radius: 15px; outline: none; background: #fafafa; }
        
        /* KLÁVESNICE */
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 20px;
        }
        .key {
            background: white;
            border: 2px solid #ddd;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            min-width: 45px;
        }
        .key:active { background: #eee; transform: translateY(2px); }
        .key-del { background: #ffebed; border-color: var(--secondary); color: var(--secondary); }
        .key-space { min-width: 120px; }

        .btn-check { display: inline-block; margin: 10px 5px; padding: 15px 30px; background: var(--success); color: white; border: none; border-radius: 15px; font-size: 1.3rem; cursor: pointer; font-weight: bold; }
        .btn-hint { display: inline-block; margin: 10px 5px; padding: 15px 30px; background: #FFB347; color: white; border: none; border-radius: 15px; font-size: 1.3rem; cursor: pointer; font-weight: bold; }

        .score-board { margin-top: 25px; font-size: 1.5rem; color: var(--primary); font-weight: bold; }
        .message { height: 35px; margin-top: 15px; font-weight: bold; font-size: 1.3rem; }
        .win { color: var(--success); }
        .error { color: var(--secondary); animation: shake 0.2s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <div id="main-menu" class="screen active-screen">
        <h1>Vyber si předmět 📚</h1>
        <div class="grid">
            <button class="card card-math" onclick="startMath()">🔢<br>Násobení</button>
            <button class="card card-cz" onclick="startCzech()">🔤<br>Čeština</button>
            <button class="card card-en" onclick="showEnGrades()">🇬🇧<br>English</button>
        </div>
    </div>

    <div id="en-grades" class="screen">
        <button class="back-btn" onclick="showScreen('main-menu')">← Zpět</button>
        <h1>Vyber si třídu 🎒</h1>
        <div class="grid">
            <button class="card card-en" onclick="showEnSub('4')">4. Třída</button>
            <button class="card card-en" onclick="showEnSub('5')">5. Třída</button>
            <button class="card card-en" onclick="showEnSub('6')">6. Třída</button>
        </div>
    </div>

    <div id="en-menu" class="screen">
        <button class="back-btn" onclick="showScreen('en-grades')">← Zpět</button>
        <h1 id="en-menu-title">English Topics 🇬🇧</h1>
        <div id="en-sub-list" class="sub-list">
            </div>
    </div>

    <div id="game-screen" class="screen">
        <button id="game-back-btn" class="back-btn">← Zpět</button>
        <div class="game-container">
            <div id="timer-display">Čas: 0s</div>
            <span id="hint-text" style="color:#888; font-style:italic;">Zadání:</span>
            <div id="q-text" class="question">Načítám...</div>
            <div class="input-area">
                <input type="text" id="ans-input" autocomplete="off" placeholder="Ťukej na klávesnici" readonly>
            </div>
            
            <button class="btn-check" onclick="checkAnswer()">Zkontrolovat!</button>
            <button class="btn-hint" onclick="showHint()">Nápověda 💡</button>
            
            <div id="msg" class="message"></div>

            <div class="keyboard" id="keyboard">
                </div>

            <div class="score-board">Skóre: <span id="score">0</span> 🔥</div>
        </div>
    </div>

    <script>
        let score = 0;
        let mode = ''; 
        let subMode = '';
        let currentAnswer = '';
        let secondsPassed = 0;
        let timerInterval;
        let shuffledEn = {}; // Tady budou zamíchané hromádky pro každou kategorii
        let shuffledCz = [];
        let czechIndex = 0;
        let enIndices = { body:0, insects:0, adj:0, subjects:0, present:0, pastBe:0, food:0 };

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const data = {
            czech: [
                {q: 'praha', a: 'Praha', h: 'Město:'}, {q: 'vltava', a: 'Vltava', h: 'Řeka:'},
                {q: 'mars', a: 'Mars', h: 'Planeta:'}, {q: 'slovensko', a: 'Slovensko', h: 'Stát:'}
            ],
            en: {
                body: [
                    {q: 'Hlava', a: 'head'}, {q: 'Ruka', a: 'hand'}, {q: 'Noha', a: 'leg'}, {q: 'Oko', a: 'eye'}, {q: 'Ucho', a: 'ear'},
                    {q: 'Nos', a: 'nose'}, {q: 'Ústa', a: 'mouth'}, {q: 'Zub', a: 'tooth'}, {q: 'Zuby', a: 'teeth'}, {q: 'Jazyk', a: 'tongue'},
                    {q: 'Krk', a: 'neck'}, {q: 'Rameno', a: 'shoulder'}, {q: 'Loket', a: 'elbow'}, {q: 'Zápěstí', a: 'wrist'}, {q: 'Prst (ruka)', a: 'finger'},
                    {q: 'Palec', a: 'thumb'}, {q: 'Nehet', a: 'nail'}, {q: 'Hrudník', a: 'chest'}, {q: 'Záda', a: 'back'}, {q: 'Břicho', a: 'stomach'},
                    {q: 'Pas', a: 'waist'}, {q: 'Bok', a: 'hip'}, {q: 'Koleno', a: 'knee'}, {q: 'Kotník', a: 'ankle'}, {q: 'Pata', a: 'heel'},
                    {q: 'Chodidlo', a: 'foot'}, {q: 'Chodidla', a: 'feet'}, {q: 'Prst (noha)', a: 'toe'}, {q: 'Kůže', a: 'skin'},
                    {q: 'Vlasy', a: 'hair'}, {q: 'Tvář', a: 'face'}
                ],
                insects: [
                    {q: 'Včela', a: 'bee'}, {q: 'Pavouk', a: 'spider'}, {q: 'Motýl', a: 'butterfly'}, {q: 'Mravenec', a: 'ant'}, {q: 'Moucha', a: 'fly'},
                    {q: 'Komár', a: 'mosquito'}, {q: 'Vosa', a: 'wasp'}, {q: 'Čmelák', a: 'bumblebee'}, {q: 'Sršeň', a: 'hornet'}, {q: 'Beruška', a: 'ladybird'},
                    {q: 'Brouk', a: 'beetle'}, {q: 'Kobylka', a: 'grasshopper'}, {q: 'Cvrček', a: 'cricket'}, {q: 'Vážka', a: 'dragonfly'}, {q: 'Můra', a: 'moth'},
                    {q: 'Šváb', a: 'cockroach'}, {q: 'Blecha', a: 'flea'}, {q: 'Veš', a: 'louse'}, {q: 'Klíště', a: 'tick'}, {q: 'Stonožka', a: 'centipede'},
                    {q: 'Žížala', a: 'earthworm'}, {q: 'Šnek', a: 'snail'}, {q: 'Slimák', a: 'slug'}, {q: 'Štír', a: 'scorpion'}, {q: 'Modlivka', a: 'mantis'},
                    {q: 'Housenka', a: 'caterpillar'}, {q: 'Larva', a: 'larva'}
                ],
                adj: [
                    {q: 'Rychlý', a: 'fast'}, {q: 'Dobrý', a: 'good'}, {q: 'Dobře', a: 'well'}, {q: 'Šťastný', a: 'happy'}, {q: 'Šťastně', a: 'happily'},
                    {q: 'Pomalý', a: 'slow'}, {q: 'Pomalu', a: 'slowly'}, {q: 'Hlasitý', a: 'loud'}, {q: 'Hlasitě', a: 'loudly'}, {q: 'Smutný', a: 'sad'},
                    {q: 'Smutně', a: 'sadly'}, {q: 'Klidný', a: 'quiet'}, {q: 'Klidně', a: 'quietly'}, {q: 'Zlý', a: 'bad'}, {q: 'Špatně', a: 'badly'},
                    {q: 'Krásný', a: 'beautiful'}, {q: 'Snadný', a: 'easy'}, {q: 'Snadno', a: 'easily'}, {q: 'Tvrdý', a: 'hard'}, {q: 'Pečlivý', a: 'careful'},
                    {q: 'Pečlivě', a: 'carefully'}, {q: 'Bezpečný', a: 'safe'}, {q: 'Silný', a: 'strong'}, {q: 'Jasný', a: 'bright'}, {q: 'Statečný', a: 'brave'},
                    {q: 'Laskavý', a: 'kind'}, {q: 'Zdvořilý', a: 'polite'}, {q: 'Hrozný', a: 'terrible'}, {q: 'Vážný', a: 'serious'}, {q: 'Hladový', a: 'hungry'},
                    {q: 'Žíznivý', a: 'thirsty'}, {q: 'Unavený', a: 'tired'}, {q: 'Nudný', a: 'boring'}, {q: 'Mladý', a: 'young'}, {q: 'Starý', a: 'old'}
                ],
                subjects: [
                    {q: 'Zeměpis', a: 'geography'}, {q: 'Tělocvik', a: 'PE'}, {q: 'Dějepis', a: 'history'}, {q: 'Výtvarka', a: 'art'}, {q: 'Matika', a: 'maths'},
                    {q: 'Angličtina', a: 'English'}, {q: 'Čeština', a: 'Czech'}, {q: 'Fyzika', a: 'physics'}, {q: 'Chemie', a: 'chemistry'}, {q: 'Přírodopis', a: 'biology'},
                    {q: 'Hudebka', a: 'music'}, {q: 'Informatika', a: 'ICT'}, {q: 'Občanka', a: 'civics'}, {q: 'Literatura', a: 'literature'}, {q: 'Němčina', a: 'German'},
                ],
                present: [
                    {q: 'I (play) tennis.', a: 'am playing'}, {q: 'She (read) a book.', a: 'is reading'}, {q: 'They (run) fast.', a: 'are running'}, {q: 'He (not sleep).', a: 'is not sleeping'}, {q: 'We (eat) lunch.', a: 'are eating'},
                    {q: 'You (watch) TV.', a: 'are watching'}, {q: 'It (rain) now.', a: 'is raining'}, {q: 'I (not cook).', a: 'am not cooking'}, {q: 'Birds (sing).', a: 'are singing'}, {q: 'The sun (shine).', a: 'is shining'},
                    {q: 'Who (knock)?', a: 'is knocking'}, {q: 'I (wait) for you.', a: 'am waiting'}, {q: 'She (dance).', a: 'is dancing'}, {q: 'They (swim).', a: 'are swimming'}, {q: 'He (drive) a car.', a: 'is driving'},
                    {q: 'We (listen).', a: 'are listening'}, {q: 'My dad (work).', a: 'is working'}, {q: 'Dogs (bark).', a: 'are barking'}, {q: 'I (write).', a: 'am writing'}, {q: 'She (not cry).', a: 'is not crying'},
                    {q: 'They (play) football.', a: 'are playing'}, {q: 'He (study).', a: 'is studying'}, {q: 'We (clean).', a: 'are cleaning'}, {q: 'You (drink).', a: 'are drinking'}, {q: 'It (snow).', a: 'is snowing'},
                    {q: 'I (sit).', a: 'am sitting'}, {q: 'She (smile).', a: 'is smiling'}, {q: 'They (talk).', a: 'are talking'}, {q: 'The cat (sleep).', a: 'is sleeping'}, {q: 'He (jump).', a: 'is jumping'}
                ],
                pastBe: [
                    {q: 'I ___ at school.', a: 'was'}, {q: 'They ___ in London.', a: 'were'}, {q: 'She ___ happy.', a: 'was'}, {q: 'You ___ my friend.', a: 'were'}, {q: 'We ___ at home.', a: 'were'},
                    {q: 'It ___ cold.', a: 'was'}, {q: 'I ___ not hungry.', a: 'was'}, {q: 'They ___ not here.', a: 'were'}, {q: 'He ___ not tired.', a: 'was'}, {q: 'We ___ not late.', a: 'were'},
                    {q: '___ you at home?', a: 'were'}, {q: '___ she okay?', a: 'was'}, {q: 'Where ___ they?', a: 'were'}, {q: 'Coffee ___ hot.', a: 'was'}, {q: 'Shops ___ open.', a: 'were'},
                    {q: 'Parents ___ angry.', a: 'were'}, {q: 'Book ___ good.', a: 'was'}, {q: 'I ___ not sad.', a: 'was'}, {q: 'We ___ not ready.', a: 'were'}, {q: 'Dog ___ outside.', a: 'was'},
                    {q: 'Cats ___ on bed.', a: 'were'}, {q: '___ it raining?', a: 'was'}, {q: 'Film ___ boring.', a: 'was'}, {q: 'You ___ not alone.', a: 'were'}, {q: 'He ___ a teacher.', a: 'was'},
                    {q: 'We ___ students.', a: 'were'}, {q: 'Room ___ dark.', a: 'was'}, {q: 'Windows ___ dirty.', a: 'were'}, {q: '___ I right?', a: 'was'}, {q: 'Water ___ cold.', a: 'was'}
                ],
                food: [
                    {q: 'Jablko', a: 'apple'}, {q: 'Sýr', a: 'cheese'}, {q: 'Chleba', a: 'bread'}, {q: 'Zelenina', a: 'vegetables'}, {q: 'Máslo', a: 'butter'},
                    {q: 'Mléko', a: 'milk'}, {q: 'Vejce', a: 'egg'}, {q: 'Maso', a: 'meat'}, {q: 'Kuře', a: 'chicken'}, {q: 'Ryba', a: 'fish'},
                    {q: 'Rýže', a: 'rice'}, {q: 'Těstoviny', a: 'pasta'}, {q: 'Polévka', a: 'soup'}, {q: 'Salát', a: 'salad'}, {q: 'Ovoce', a: 'fruit'},
                    {q: 'Brambory', a: 'potatoes'}, {q: 'Rajče', a: 'tomato'}, {q: 'Okurka', a: 'cucumber'}, {q: 'Cibule', a: 'onion'}, {q: 'Česnek', a: 'garlic'},
                    {q: 'Mrkev', a: 'carrot'}, {q: 'Banán', a: 'banana'}, {q: 'Pomeranč', a: 'orange'}, {q: 'Jahoda', a: 'strawberry'}, {q: 'Hrozny', a: 'grapes'},
                    {q: 'Dort', a: 'cake'}, {q: 'Čokoláda', a: 'chocolate'}, {q: 'Zmrzlina', a: 'ice cream'}, {q: 'Cukr', a: 'sugar'}, {q: 'Sůl', a: 'salt'},
                    {q: 'Voda', a: 'water'}, {q: 'Čaj', a: 'tea'}, {q: 'Káva', a: 'coffee'}, {q: 'Džus', a: 'juice'}, {q: 'Pizza', a: 'pizza'}
                ]
            }
        };

        // Klávesnice písmena
        const letters = "qwertzuiopasdfghjklyxcvbnm".split("");

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function showEnGrades() {
            showScreen('en-grades');
        }

        function showEnSub(grade) {
            const list = document.getElementById('en-sub-list');
            list.innerHTML = '';
            document.getElementById('en-menu-title').textContent = `English - ${grade}. Třída`;
            
            let topics = [];
            if (grade === '4') topics = ['food',]
            if (grade === '5') topics = ['food', 'body', 'insects'];
            if (grade === '6') topics = ['body', 'insects', 'adj', 'present', 'pastBe', 'food', 'subjects']; // Vše kromě předmětů

            topics.forEach(t => {
                let div = document.createElement('div');
                div.className = 'sub-item';
                div.textContent = t.toUpperCase();
                div.onclick = () => startEn(t);
                list.appendChild(div);
            });
            showScreen('en-menu');
        }

        function startMath() { mode = 'math'; setupGame(); }
        function startCzech() { mode = 'czech'; setupGame(); }
        function startEn(t) { mode = 'en'; subMode = t; setupGame(); }

        function setupGame() {
            if (mode === 'en') {
                clearInterval(timerInterval);
                secondsPassed = 0;
                document.getElementById('timer-display').style.display = 'block';
                startTimer();
            } else {
                document.getElementById('timer-display').style.display = 'none';
                clearInterval(timerInterval);
            }

            document.getElementById('game-back-btn').onclick = () => {
                clearInterval(timerInterval);
                if(mode === 'en') showScreen('en-menu');
                else showScreen('main-menu');
            };
            
            createKeyboard();
            showScreen('game-screen');
            newQuestion();
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            
            // Přidáme písmena
            letters.forEach(l => {
                let b = document.createElement('button');
                b.className = 'key';
                b.textContent = l;
                b.onclick = () => { document.getElementById('ans-input').value += l; };
                kb.appendChild(b);
            });

            // Speciální klávesy
            let space = document.createElement('button');
            space.className = 'key key-space';
            space.textContent = 'Mezera';
            space.onclick = () => { document.getElementById('ans-input').value += ' '; };
            kb.appendChild(space);

            let del = document.createElement('button');
            del.className = 'key key-del';
            del.textContent = 'Smazat ⌫';
            del.onclick = () => { 
                let cur = document.getElementById('ans-input').value;
                document.getElementById('ans-input').value = cur.slice(0, -1);
            };
            kb.appendChild(del);
        }

        function startTimer() {
            if (mode !== 'en') return;
            const display = document.getElementById('timer-display');
            timerInterval = setInterval(() => {
                secondsPassed++;
                let m = Math.floor(secondsPassed / 60);
                let s = secondsPassed % 60;
                display.textContent = m > 0 ? `Čas: ${m}m ${s}s` : `Čas: ${s}s`;
            }, 1000);
        }

        function newQuestion() {
            const qEl = document.getElementById('q-text'), hEl = document.getElementById('hint-text'), input = document.getElementById('ans-input');
            input.value = ""; 
            document.getElementById('msg').textContent = "";
            
            if (mode === 'math') {
                let a = Math.floor(Math.random() * 10) + 1, b = Math.floor(Math.random() * 10) + 1;
                currentAnswer = (a * b).toString(); 
                qEl.textContent = `${a} × ${b}`; 
                hEl.textContent = "Vypočítej:";
            } 
            else if (mode === 'czech') {
                // Pokud balíček neexistuje nebo je prázdný, zamíchej znova
                if (!shuffledCz || shuffledCz.length === 0) {
                    shuffledCz = shuffle([...data.czech]);
                }
                let item = shuffledCz.pop(); // Vyber poslední kartu z balíčku
                currentAnswer = item.a; 
                qEl.textContent = item.q; 
                hEl.textContent = item.h;
            } 
            else if (mode === 'en') {
                // Pokud balíček pro danou kategorii neexistuje nebo je prázdný
                if (!shuffledEn[subMode] || shuffledEn[subMode].length === 0) {
                    shuffledEn[subMode] = shuffle([...data.en[subMode]]);
                }
                let item = shuffledEn[subMode].pop(); // Vyber poslední kartu
                currentAnswer = item.a; 
                qEl.textContent = item.q; 
                hEl.textContent = "Přelož:";
            }
        }

        function showHint() {
            const msg = document.getElementById('msg');
            msg.textContent = `Nápověda: ${currentAnswer}`;
            msg.style.color = "#FFB347";
            setTimeout(() => { if(msg.textContent.includes("Nápověda")) msg.textContent = ""; }, 2000);
        }

        function checkAnswer() {
            const val = document.getElementById('ans-input').value.trim();
            const msg = document.getElementById('msg');
            
            if (val.toLowerCase() === currentAnswer.toLowerCase()) {
                score += 10;
                msg.textContent = "SKVĚLE! 🌟"; msg.className = "message win";
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
                setTimeout(newQuestion, 1200);
            } else {
                score = Math.max(0, score - 5);
                msg.textContent = "Zkus to znovu 💪"; msg.className = "message error";
            }
            document.getElementById('score').textContent = score;
        }
    </script>
</body>
</html>
