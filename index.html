<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HonzaUceni - 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #FF6584;
            --success: #4CAF50;
            --bg: #F0F2F5;
            --en-color: #00B4D8;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--primary); margin-bottom: 20px; text-align: center; }

        .screen { width: 100%; max-width: 800px; display: none; }
        .active-screen { display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 30px 15px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 25px rgba(0,0,0,0.15); }
        .card-math { border-bottom: 8px solid var(--primary); color: var(--primary); }
        .card-cz { border-bottom: 8px solid var(--secondary); color: var(--secondary); }
        .card-en { border-bottom: 8px solid var(--en-color); color: var(--en-color); }

        .sub-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 600px; margin: 0 auto; }
        .sub-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: 2px solid var(--en-color);
            color: var(--en-color);
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .sub-item:hover { background: var(--en-color); color: white; }

        .section-header {
            font-family: 'Fredoka One', cursive;
            color: #555;
            margin: 25px 0 10px 0;
            text-align: center;
            grid-column: 1 / -1;
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        #timer-display {
            position: absolute;
            top: -50px;
            right: 0;
            background: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-family: 'Fredoka One', cursive;
            color: var(--en-color);
            border: 2px solid var(--en-color);
        }

        .back-btn {
            background: #eee;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question { font-size: 2rem; margin: 10px 0; color: #333; }
        input { font-size: 1.4rem; padding: 10px; width: 80%; text-align: center; border: 3px solid #ddd; border-radius: 15px; outline: none; }
        
        .keyboard {
            display: flex;
            flex-direction: column; /* Řazení řádků pod sebe */
            align-items: center;
            gap: 0; 
            margin-top: 20px;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 20px;
        }

        .key {
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #bbb; /* Trošku 3D efekt jako real klávesy */
        }

        .key:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #bbb;
        }
        .key-space { min-width: 100px; }

        .btn-check { padding: 12px 25px; background: var(--success); color: white; border: none; border-radius: 12px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-hint { padding: 12px 25px; background: #FFB347; color: white; border: none; border-radius: 12px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin: 5px; }

        .score-board { margin-top: 20px; font-size: 1.2rem; color: var(--primary); font-weight: bold; }
        .message { height: 30px; margin-top: 10px; font-weight: bold; }
        .win { color: var(--success); }
        .error { color: var(--secondary); animation: shake 0.2s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .q-row { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; gap: 8px; align-items: center; border-left: 4px solid var(--primary); }
        .q-row input { font-size: 0.9rem; padding: 5px; width: 30%; }
        
        #teacher-login-btn { position: fixed; bottom: 10px; right: 10px; opacity: 0.3; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <button class="back-btn" onclick="showScreen('main-menu')">← Zpět</button>
        <h1>Teacher Login 👨‍🏫</h1>
        <div class="game-container">
            <input id="login-name" placeholder="Jméno (Honza)"><br><br>
            <input id="login-pass" type="password" placeholder="Heslo"><br><br>
            <button class="btn-check" onclick="login()">Přihlásit</button>
            <div id="login-msg" class="message"></div>
        </div>
    </div>

    <div id="custom-create" class="screen">
        <button class="back-btn" onclick="showScreen('en-menu')">← Zpět</button>
        <h1>Editor lekce ✏️</h1>
        <div style="text-align: center; margin-bottom: 15px;">
            <input id="lesson-name-input" placeholder="Název cvičení" style="width: 60%; border: 2px solid var(--primary);">
        </div>
        <div id="custom-list" style="max-height: 350px; overflow-y: auto; margin-bottom: 15px;"></div>
        <div style="text-align: center;">
            <button class="btn-check" style="background: var(--primary);" onclick="addQuestion()">+1 otázka</button>
            <button class="btn-check" style="background: var(--secondary);" onclick="removeQuestion()">-1 otázka</button>
            <button class="btn-check" onclick="saveAndPlay()">Uložit a Hrát! 🚀</button>
        </div>
    </div>

    <div id="main-menu" class="screen active-screen">
        <h1>HonzaUceni</h1>
        <div class="grid">
            <button class="card card-math" onclick="startMath()">🔢<br>Násobení</button>
            <button class="card card-cz" onclick="startCzech()">🔤<br>Čeština</button>
            <button class="card card-en" onclick="showEnGrades()">👑<br>English</button>
        </div>
        <button id="teacher-login-btn" onclick="showScreen('login-screen')">🔐 Login</button>
    </div>

    <div id="en-grades" class="screen">
        <button class="back-btn" onclick="showScreen('main-menu')">← Zpět</button>
        <h1>Vyber si třídu 🎒</h1>
        <div class="grid" id="grades-grid">
            <button class="card card-en" onclick="showEnSub('4')">4. Třída</button>
            <button class="card card-en" onclick="showEnSub('5')">5. Třída</button>
            <button class="card card-en" onclick="showEnSub('6')">6. Třída</button>
            <button class="card card-en" onclick="showEnSub('7')">7. Třída</button>
            <button class="card card-en" onclick="showEnSub('8')">8. Třída</button>
            <button class="card card-en" onclick="showEnSub('9')">9. Třída</button>
        </div>
    </div>

    <div id="en-menu" class="screen">
        <button class="back-btn" onclick="showScreen('en-grades')">← Zpět</button>
        <h1 id="en-menu-title">Témata 🇬🇧</h1>
        <div id="en-sub-list" class="sub-list"></div>
        <div id="my-exercises-section" style="display:none;">
            <div class="section-header">Moje Cvičení ⭐</div>
            <div id="my-exercises-list" class="sub-list"></div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <button id="game-back-btn" class="back-btn">← Zpět</button>
        <div class="game-container">

            <span id="hint-text" style="color:#888; font-style:italic;">Zadání:</span>
            <div id="q-text" class="question">Načítám...</div>
            <div class="input-area">
                <input type="text" id="ans-input" autocomplete="off" placeholder="Odpověď..." readonly>
            </div>
            <button class="btn-check" onclick="checkAnswer()">Zkontrolovat!</button>
            <button class="btn-hint" onclick="showHint()">Pomoc 💡</button>
            <div id="msg" class="message"></div>
            <div class="keyboard" id="keyboard"></div>
            <div class="score-board">Skóre: <span id="score">0</span> 🔥</div>
        </div>
    </div>

                presentCont: [{q:'Já právě píšu',a:'i am writing'},{q:'Ty právě jíš',a:'you are eating'},{q:'On právě běží',a:'he is running'},{q:'Ona právě spí',a:'she is sleeping'},{q:'My právě hrajeme',a:'we are playing'},{q:'Oni právě sledují',a:'they are watching'},{q:'Já právě nejdu',a:'i am not going'},{q:'Co právě děláš?',a:'what are you doing'},{q:'Ona právě čte',a:'she is reading'},{q:'Počkej',a:'wait'},{q:'Poslouchej',a:'listen'},{q:'Dívej se',a:'look'},{q:'Nyní',a:'now'},{q:'Právě teď',a:'at the moment'},{q:'Dnes',a:'today'}],

                // 9. TŘÍDA
                irregular: [{q:'Být (be)',a:'was been'},{q:'Jít (go)',a:'went gone'},{q:'Vidět (see)',a:'saw seen'},{q:'Jíst (eat)',a:'ate eaten'},{q:'Pít (drink)',a:'drank drunk'},{q:'Dělat (do)',a:'did done'},{q:'Mít (have)',a:'had had'},{q:'Psát (write)',a:'wrote written'},{q:'Číst (read)',a:'read read'},{q:'Mluvit (speak)',a:'spoke spoken'},{q:'Vzít (take)',a:'took taken'},{q:'Dát (give)',a:'gave given'},{q:'Koupit (buy)',a:'bought bought'},{q:'Spát (sleep)',a:'slept slept'},{q:'Běžet (run)',a:'ran run'}],
                tech: [{q:'Počítač',a:'computer'},{q:'Notebook',a:'laptop'},{q:'Klávesnice',a:'keyboard'},{q:'Myš',a:'mouse'},{q:'Obrazovka',a:'screen'},{q:'Internet',a:'internet'},{q:'Heslo',a:'password'},{q:'Uložit',a:'save'},{q:'Smazat',a:'delete'},{q:'Stáhnout',a:'download'},{q:'Nahrát (upload)',a:'upload'},{q:'Software',a:'software'},{q:'Aplikace',a:'application'},{q:'Nabíječka',a:'charger'},{q:'Sluchátka',a:'headphones'}],
                eco: [{q:'Životní prostředí',a:'environment'},{q:'Znečištění',a:'pollution'},{q:'Recyklace',a:'recycling'},{q:'Plast',a:'plastic'},{q:'Odpadky',a:'rubbish'},{q:'Energie',a:'energy'},{q:'Sluneční energie',a:'solar energy'},{q:'Globální oteplování',a:'global warming'},{q:'Chránit',a:'protect'},{q:'Šetřit',a:'save'},{q:'Příroda',a:'nature'},{q:'Les',a:'forest'},{q:'Vzduch',a:'air'},{q:'Voda',a:'water'},{q:'Zvířata',a:'animals'}],
                feelings: [{q:'Šťastný',a:'happy'},{q:'Smutný',a:'sad'},{q:'Naštvaný',a:'angry'},{q:'Unavený',a:'tired'},{q:'Vyděšený',a:'scared'},{q:'Překvapený',a:'surprised'},{q:'Nudící se',a:'bored'},{q:'Nadšený',a:'excited'},{q:'Nervózní',a:'nervous'},{q:'Hrdý',a:'proud'},{q:'Osamělý',a:'lonely'},{q:'Zmatený',a:'confused'},{q:'Nemocný',a:'sick'},{q:'Hladový',a:'hungry'},{q:'Žíznivý',a:'thirsty'}],
                phrasal: [{q:'Vstát',a:'get up'},{q:'Posadit se',a:'sit down'},{q:'Vstát (ze židle)',a:'stand up'},{q:'Vrátit se',a:'come back'},{q:'Pokračovat',a:'go on'},{q:'Vydat se (hledat)',a:'look for'},{q:'Vypnout',a:'turn off'},{q:'Zapnout',a:'turn on'},{q:'Vzdát se',a:'give up'},{q:'Vyplnit',a:'fill in'},{q:'Sundat si',a:'take off'},{q:'Obléknout si',a:'put on'},{q:'Zjistit',a:'find out'},{q:'Vyrůstat',a:'grow up'},{q:'Dávat pozor na',a:'look after'}]
            }
        };

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function login() {
            if (document.getElementById('login-name').value === "Honza" && document.getElementById('login-pass').value === "Honza98") {
                isTeacher = true;
                document.getElementById('login-msg').textContent = "Vítej, pane učiteli! ✅";
                setTimeout(() => showScreen('main-menu'), 1000);
            } else {
                document.getElementById('login-msg').textContent = "Chyba ❌";
            }
        }

        function showEnGrades() { showScreen('en-grades'); }

        function showEnSub(grade) {
            currentGrade = grade;
            const list = document.getElementById('en-sub-list');
            list.innerHTML = '';
            document.getElementById('en-menu-title').textContent = `${grade}. Třída - Témata`;
            
            let topics = [];
            switch(grade) {
                case '4': topics = ['colors', 'numbers', 'family', 'greetings', 'school']; break;
                case '5': topics = ['house', 'clothes', 'hobbies', 'days', 'weather']; break;
                case '6': topics = ['city', 'food', 'transport', 'nature', 'body']; break;
                case '7': topics = ['sports', 'jobs', 'opposites', 'pastBe', 'prepositions']; break;
                case '8': topics = ['travel', 'shopping', 'kitchen', 'animals', 'presentCont']; break;
                case '9': topics = ['irregular', 'tech', 'eco', 'feelings', 'phrasal']; break;
            }

            topics.forEach(t => {
                let div = document.createElement('div');
                div.className = 'sub-item';
                div.textContent = t.toUpperCase();
                div.onclick = () => { mode = 'en'; setupGame(data.en[t]); };
                list.appendChild(div);
            });

            renderMyExercises(grade);

            if (isTeacher) {
                let div = document.createElement('div');
                div.className = 'sub-item';
                div.style.borderColor = 'var(--secondary)';
                div.style.color = 'var(--secondary)';
                div.style.marginTop = "15px";
                div.textContent = "⚙️ VYTVOŘIT VLASTNÍ";
                div.onclick = () => { 
                    teacherQuestions = [{q: "", a: "", h: "Přelož:"}]; 
                    document.getElementById('lesson-name-input').value = '';
                    renderEditor(); 
                    showScreen('custom-create'); 
                };
                list.appendChild(div);
            }
            showScreen('en-menu');
        }

        function renderMyExercises(grade) {
            const section = document.getElementById('my-exercises-section');
            const list = document.getElementById('my-exercises-list');
            const savedLessons = JSON.parse(localStorage.getItem(`my_exercises_grade_${grade}`)) || [];
            if (savedLessons.length > 0) {
                section.style.display = 'block';
                list.innerHTML = '';
                savedLessons.forEach((lesson) => {
                    let div = document.createElement('div');
                    div.className = 'sub-item';
                    div.style.borderColor = 'orange';
                    div.textContent = lesson.name;
                    div.onclick = () => { mode = 'teacher'; setupGame(lesson.questions); };
                    list.appendChild(div);
                });
            } else { section.style.display = 'none'; }
        }

        function renderEditor() {
            const container = document.getElementById('custom-list');
            container.innerHTML = '';
            teacherQuestions.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'q-row';
                row.innerHTML = `<span>${index+1}.</span><input placeholder="Zadání" value="${item.q}" oninput="teacherQuestions[${index}].q = this.value"><input placeholder="Odpověď" value="${item.a}" oninput="teacherQuestions[${index}].a = this.value"><input placeholder="Hint" value="${item.h}" oninput="teacherQuestions[${index}].h = this.value">`;
                container.appendChild(row);
            });
        }

        function addQuestion() { teacherQuestions.push({q: "", a: "", h: "Přelož:"}); renderEditor(); }
        function removeQuestion() { if(teacherQuestions.length > 1) teacherQuestions.pop(); renderEditor(); }
        
        function saveAndPlay() {
            const lessonName = document.getElementById('lesson-name-input').value || "Vlastní lekce";
            let savedLessons = JSON.parse(localStorage.getItem(`my_exercises_grade_${currentGrade}`)) || [];
            savedLessons.push({ name: lessonName, questions: [...teacherQuestions] });
            localStorage.setItem(`my_exercises_grade_${currentGrade}`, JSON.stringify(savedLessons));
            mode = 'teacher';
            setupGame(teacherQuestions);
        }

        function startMath() { mode = 'math'; setupGame([]); }
        function startCzech() { mode = 'czech'; setupGame(data.czech); }

        function setupGame(questionsToUse) {
            score = 0; 
            document.getElementById('score').textContent = score;
            clearInterval(timerInterval);
            secondsPassed = 0;
            if (mode !== 'math') {
                document.getElementById('timer-display').style.display = 'block';
                timerInterval = setInterval(() => {
                    secondsPassed++;
                    document.getElementById('timer-display').textContent = `Čas: ${secondsPassed}s`;
                }, 1000);
                shuffledQuestions = shuffleArray(questionsToUse);
                currentQuestionIndex = 0;
            } else {
                document.getElementById('timer-display').style.display = 'none';
            }
            createKeyboard();
            showScreen('game-screen');
            newQuestion();
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            
            // Rozložení jako na reálné klávesnici
            const rows = [
                "qwertyuiop",
                "asdfghjkl",
                "zxcvbnm"
            ];

            rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.style.display = "flex";
                rowDiv.style.justifyContent = "center";
                rowDiv.style.gap = "8px";
                rowDiv.style.width = "100%";
                rowDiv.style.marginBottom = "8px";

                row.split("").forEach(l => {
                    let b = document.createElement('button');
                    b.className = 'key'; 
                    b.textContent = l;
                    // Zvětšení kláves přímo v JS pro jistotu
                    b.style.minWidth = "45px";
                    b.style.padding = "15px 10px";
                    b.style.fontSize = "1.4rem";
                    
                    b.onclick = () => document.getElementById('ans-input').value += l;
                    rowDiv.appendChild(b);
                });
                kb.appendChild(rowDiv);
            });

            // Spodní řada s mezerou a smazáním
            const bottomRow = document.createElement('div');
            bottomRow.style.display = "flex";
            bottomRow.style.justifyContent = "center";
            bottomRow.style.gap = "8px";
            bottomRow.style.width = "100%";

            let space = document.createElement('button');
            space.className = 'key key-space'; 
            space.textContent = 'Mezera';
            space.style.minWidth = "150px";
            space.style.padding = "15px";
            space.onclick = () => document.getElementById('ans-input').value += ' ';

            let del = document.createElement('button');
            del.className = 'key key-del'; 
            del.textContent = '⌫';
            del.style.minWidth = "60px";
            del.style.padding = "15px";
            del.onclick = () => document.getElementById('ans-input').value = document.getElementById('ans-input').value.slice(0, -1);

            bottomRow.appendChild(space);
            bottomRow.appendChild(del);
            kb.appendChild(bottomRow);
        }

        function newQuestion() {
            document.getElementById('ans-input').value = '';
            document.getElementById('msg').textContent = '';
            const qEl = document.getElementById('q-text');
            const hEl = document.getElementById('hint-text');

            if (mode === 'math') {
                let a = Math.floor(Math.random() * 10) + 1, b = Math.floor(Math.random() * 10) + 1;
                currentAnswer = (a * b).toString();
                qEl.textContent = `${a} × ${b}`; hEl.textContent = "Vypočítej:";
            } else {
                if (currentQuestionIndex >= shuffledQuestions.length) {
                    shuffledQuestions = shuffleArray(shuffledQuestions);
                    currentQuestionIndex = 0;
                }
                let item = shuffledQuestions[currentQuestionIndex];
                currentAnswer = item.a;
                qEl.textContent = item.q;
                hEl.textContent = item.h || "Přelož:";
                currentQuestionIndex++;
            }
        }

        function checkAnswer() {
            const val = document.getElementById('ans-input').value.trim().toLowerCase();
            const msg = document.getElementById('msg');
            if (val === currentAnswer.toLowerCase()) {
                score += 10;
                msg.textContent = "SKVĚLE! 🌟"; msg.className = "message win";
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
                setTimeout(newQuestion, 1200);
            } else {
                msg.textContent = "Zkus to znovu 💪"; msg.className = "message error";
            }
            document.getElementById('score').textContent = score;
        }

        function showHint() {
            document.getElementById('msg').textContent = `Odpověď: ${currentAnswer}`;
            document.getElementById('msg').style.color = "orange";
        }

        document.getElementById('game-back-btn').onclick = () => {
            clearInterval(timerInterval);
            if (mode === 'teacher' || mode === 'en') { showEnSub(currentGrade); }
            else { showScreen('main-menu'); }
        }
    </script>
</body>
</html>
