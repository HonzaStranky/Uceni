    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #FF6584;
            --success: #4CAF50;
            --bg: #F0F2F5;
            --en-color: #00B4D8;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--primary); margin-bottom: 20px; text-align: center; }

        .screen { width: 100%; max-width: 800px; display: none; }
        .active-screen { display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-family: 'Fredoka One', cursive;
            font-size: 1.4rem;
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 25px rgba(0,0,0,0.15); }
        .card-math { border-bottom: 10px solid var(--primary); color: var(--primary); }
        .card-cz { border-bottom: 10px solid var(--secondary); color: var(--secondary); }
        .card-en { border-bottom: 10px solid var(--en-color); color: var(--en-color); }

        .sub-list { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .sub-item {
            background: white;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid var(--en-color);
            color: var(--en-color);
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .sub-item:hover { background: var(--en-color); color: white; }

        .game-container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        #timer-display {
            position: absolute;
            top: -60px;
            right: 0;
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            color: var(--en-color);
            border: 3px solid var(--en-color);
            display: none; /* Schovaný na začátku */
        }

        .back-btn {
            background: #eee;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .question { font-size: 2.2rem; margin: 20px 0; color: #333; line-height: 1.4; }
        input { font-size: 1.8rem; padding: 10px; width: 85%; text-align: center; border: 3px solid #ddd; border-radius: 15px; outline: none; }
        .btn-check { display: block; margin: 25px auto 0; padding: 15px 40px; background: var(--success); color: white; border: none; border-radius: 15px; font-size: 1.3rem; cursor: pointer; font-weight: bold; }

        .score-board { margin-top: 25px; font-size: 1.5rem; color: var(--primary); font-weight: bold; }
        .message { height: 35px; margin-top: 15px; font-weight: bold; font-size: 1.3rem; }
        .win { color: var(--success); }
        .error { color: var(--secondary); animation: shake 0.2s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>

                clearInterval(timerInterval); // Pro jistotu vyčistit starý
                secondsPassed = 0; // Začít od nuly
                document.getElementById('timer-display').style.display = 'block';
                startTimer(); // Spustit hodiny
            } else {
                document.getElementById('timer-display').style.display = 'none';
                clearInterval(timerInterval);
            }

            document.getElementById('game-back-btn').onclick = () => {
                clearInterval(timerInterval);
                if(mode === 'en') showScreen('en-menu');
                else showScreen('main-menu');
            };
            showScreen('game-screen');
            newQuestion();
        }

       function startTimer() {
            if (mode !== 'en') return;
            clearInterval(timerInterval);
            // secondsPassed neresetujeme zde, pokud chceš, aby to běželo celou hru (přesunuto do setupGame)
            const display = document.getElementById('timer-display');

            timerInterval = setInterval(() => {
                secondsPassed++;
                
                // Výpočet minut a zbývajících vteřin
                let m = Math.floor(secondsPassed / 60);
                let s = secondsPassed % 60;

                // Formátování: Pokud jsou minuty > 0, vypiš "Xm Ys", jinak jen "Ys"
                if (m > 0) {
                    display.textContent = `Čas: ${m}m ${s}s`;
                } else {
                    display.textContent = `Čas: ${s}s`;
                }
            }, 1000);
        }

        function newQuestion() {
            const qEl = document.getElementById('q-text');
            const hEl = document.getElementById('hint-text');
            const input = document.getElementById('ans-input');
            input.value = ""; input.focus();
            document.getElementById('msg').textContent = "";

            if (mode === 'math') {
                let a = Math.floor(Math.random() * 10) + 1;
                let b = Math.floor(Math.random() * 10) + 1;
                currentAnswer = (a * b).toString();
                qEl.textContent = `${a} × ${b}`;
                hEl.textContent = "Vypočítej:";
            } else if (mode === 'czech') {
                let item = data.czech[czechIndex];
                currentAnswer = item.a;
                qEl.textContent = item.q;
                hEl.textContent = item.h;
                czechIndex = (czechIndex + 1) % data.czech.length;
            } else if (mode === 'en') {
                let list = data.en[subMode];
                let item = list[enIndices[subMode]];
                currentAnswer = item.a;
                qEl.textContent = item.q;
                hEl.textContent = "Přelož:";
                enIndices[subMode] = (enIndices[subMode] + 1) % list.length;
            }
        }

        function checkAnswer() {
            const val = document.getElementById('ans-input').value.trim();
            const msg = document.getElementById('msg');
            
            if (val.toLowerCase() === currentAnswer.toLowerCase()) {
                score += 10;
                msg.textContent = "SKVĚLE! 🌟"; msg.className = "message win";
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
                setTimeout(newQuestion, 1200);
            } else {
                score = Math.max(0, score - 5);
                msg.textContent = "Zkus to znovu 💪"; msg.className = "message error";
            }
            document.getElementById('score').textContent = score;
        }

        document.getElementById('ans-input').addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') checkAnswer(); 
        });
    </script>
</body>
</html>
