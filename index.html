<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HonzaUceni</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #FF6584;
            --success: #4CAF50;
            --bg: #F0F2F5;
            --en-color: #00B4D8;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--primary); margin-bottom: 20px; text-align: center; }

        .screen { width: 100%; max-width: 800px; display: none; }
        .active-screen { display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-family: 'Fredoka One', cursive;
            font-size: 1.4rem;
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 25px rgba(0,0,0,0.15); }
        .card-math { border-bottom: 10px solid var(--primary); color: var(--primary); }
        .card-cz { border-bottom: 10px solid var(--secondary); color: var(--secondary); }
        .card-en { border-bottom: 10px solid var(--en-color); color: var(--en-color); }

        .sub-list { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .sub-item {
            background: white;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid var(--en-color);
            color: var(--en-color);
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .sub-item:hover { background: var(--en-color); color: white; }

        .game-container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        #timer-display {
            position: absolute;
            top: -60px;
            right: 0;
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            color: var(--en-color);
            border: 3px solid var(--en-color);
            display: none;
        }

        .back-btn {
            background: #eee;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .question { font-size: 2.2rem; margin: 10px 0; color: #333; line-height: 1.4; }
        
        /* Styl pro input a nápovědu */
        .input-area { margin: 20px 0; }
        input { font-size: 1.8rem; padding: 10px; width: 85%; text-align: center; border: 3px solid #ddd; border-radius: 15px; outline: none; background: #fafafa; }
        
        /* KLÁVESNICE */
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 20px;
        }
        .key {
            background: white;
            border: 2px solid #ddd;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            min-width: 45px;
        }
        .key:active { background: #eee; transform: translateY(2px); }
        .key-del { background: #ffebed; border-color: var(--secondary); color: var(--secondary); }
        .key-space { min-width: 120px; }

        .btn-check { display: inline-block; margin: 10px 5px; padding: 15px 30px; background: var(--success); color: white; border: none; border-radius: 15px; font-size: 1.3rem; cursor: pointer; font-weight: bold; }
        .btn-hint { display: inline-block; margin: 10px 5px; padding: 15px 30px; background: #FFB347; color: white; border: none; border-radius: 15px; font-size: 1.3rem; cursor: pointer; font-weight: bold; }

        .score-board { margin-top: 25px; font-size: 1.5rem; color: var(--primary); font-weight: bold; }
        .message { height: 35px; margin-top: 15px; font-weight: bold; font-size: 1.3rem; }
        .win { color: var(--success); }
        .error { color: var(--secondary); animation: shake 0.2s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>

            if (grade === '4') topics = ['food', 'animals'];

            if (grade === '6') topics = ['adjectives', 'body', 'insects', 'pastBe'];
            if (grade === '7') topics = ['adjectives', 'body', 'insects', 'pastBe'];
            if (grade === '8') topics = ['jobs', 'environment', 'presentperfect', 'passiveVoice'];

            topics.forEach(t => {
                let div = document.createElement('div');

                div.textContent = t.toUpperCase();

                list.appendChild(div);

        function startMath() { mode = 'math'; setupGame(); }

        function setupGame() {
            if (mode === 'en') {
                clearInterval(timerInterval);
                secondsPassed = 0;
                document.getElementById('timer-display').style.display = 'block';
                startTimer();
            } else {
                document.getElementById('timer-display').style.display = 'none';
                clearInterval(timerInterval);
            }

            document.getElementById('game-back-btn').onclick = () => {
                clearInterval(timerInterval);
                if(mode === 'en') showScreen('en-menu');
                else showScreen('main-menu');
            };
            
            createKeyboard();
            showScreen('game-screen');
            newQuestion();
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            
            // Přidáme písmena
            letters.forEach(l => {
                let b = document.createElement('button');
                b.className = 'key';
                b.textContent = l;
                b.onclick = () => { document.getElementById('ans-input').value += l; };
                kb.appendChild(b);
            });

            // Speciální klávesy
            let space = document.createElement('button');
            space.className = 'key key-space';
            space.textContent = 'Mezera';
            space.onclick = () => { document.getElementById('ans-input').value += ' '; };
            kb.appendChild(space);

            let del = document.createElement('button');
            del.className = 'key key-del';
            del.textContent = 'Smazat ⌫';
            del.onclick = () => { 
                let cur = document.getElementById('ans-input').value;
                document.getElementById('ans-input').value = cur.slice(0, -1);
            };
            kb.appendChild(del);
        }

        function startTimer() {
            if (mode !== 'en') return;
            const display = document.getElementById('timer-display');
            timerInterval = setInterval(() => {
                secondsPassed++;
                let m = Math.floor(secondsPassed / 60);
                let s = secondsPassed % 60;
                display.textContent = m > 0 ? `Čas: ${m}m ${s}s` : `Čas: ${s}s`;
            }, 1000);
        }

            if (mode === 'math') {
                let a = Math.floor(Math.random() * 10) + 1, b = Math.floor(Math.random() * 10) + 1;
                currentAnswer = (a * b).toString(); 
                qEl.textContent = `${a} × ${b}`; 
                hEl.textContent = "Vypočítej:";
            } 
            else if (mode === 'czech') {
                // Pokud balíček neexistuje nebo je prázdný, zamíchej znova
                if (!shuffledCz || shuffledCz.length === 0) {
                    shuffledCz = shuffle([...data.czech]);
                }
                let item = shuffledCz.pop(); // Vyber poslední kartu z balíčku
                currentAnswer = item.a; 
                qEl.textContent = item.q; 
                hEl.textContent = item.h;
            } 
            else if (mode === 'en') {
                // Pokud balíček pro danou kategorii neexistuje nebo je prázdný
                if (!shuffledEn[subMode] || shuffledEn[subMode].length === 0) {
                    shuffledEn[subMode] = shuffle([...data.en[subMode]]);
                }
                let item = shuffledEn[subMode].pop(); // Vyber poslední kartu
                currentAnswer = item.a; 
                qEl.textContent = item.q; 
                hEl.textContent = "Translate Přelož:";
            }
        }

        function showHint() {
            const msg = document.getElementById('msg');
            msg.textContent = `Nápověda: ${currentAnswer}`;
            msg.style.color = "#FFB347";
            setTimeout(() => { if(msg.textContent.includes("Nápověda")) msg.textContent = ""; }, 2000);
        }

        function checkAnswer() {
            const val = document.getElementById('ans-input').value.trim();
            const msg = document.getElementById('msg');
            
            if (val.toLowerCase() === currentAnswer.toLowerCase()) {
                score += 10;
                msg.textContent = "SKVĚLE! 🌟"; msg.className = "message win";
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
                setTimeout(newQuestion, 1200);
            } else {
                score = Math.max(0, score - 5);
                msg.textContent = "Zkus to znovu 💪"; msg.className = "message error";
            }
            document.getElementById('score').textContent = score;
        }
    </script>
</body>
</html>
